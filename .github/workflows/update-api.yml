name: Update API JSON

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update JSON
        run: |
          echo "$UPDATED_JSON" > api/projects.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add api/projects.json
          git commit -m "Update API JSON" || echo "No changes to commit"
          git push